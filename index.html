<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#87b9d9">
    <meta
      name="description"
      content="War 3D v1.3: mundo cúbico con árboles y texturas procedurales para navegador y móvil."
    >
    <title>War 3D — v1.3</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main id="game" aria-label="War 3D">
      <section id="start-screen" class="start-screen" aria-labelledby="start-title">
        <div class="start-screen__card">
          <div class="start-screen__logo">
            <span class="start-screen__mark" aria-hidden="true">W</span>
            <div>
              <h1 id="start-title">WAR <strong>3D</strong></h1>
              <p>MUNDO DE BLOQUES</p>
            </div>
          </div>
          <form id="world-form" class="world-form">
            <label for="world-name">NOMBRE DEL MUNDO</label>
            <input
              id="world-name"
              name="worldName"
              type="text"
              maxlength="24"
              placeholder="Mi mundo"
              autocomplete="off"
              required
            >
            <button type="submit">
              <span aria-hidden="true">＋</span>
              CREAR NUEVO MUNDO
            </button>
          </form>
          <p class="start-screen__version">v1.3 • TEXTURAS PROCEDURALES</p>
        </div>
      </section>

      <canvas id="game-canvas" role="img" aria-label="Mundo 3D de War 3D"></canvas>

      <header class="hud" aria-hidden="true">
        <div class="brand">
          <span class="brand__mark">W</span>
          <div>
            <h1>WAR <strong>3D</strong></h1>
            <p>PROTOTIPO DE MOVIMIENTO</p>
          </div>
        </div>
        <span id="version-badge" class="version-badge">v1.3 • THREE.JS</span>
      </header>

      <div class="crosshair" aria-hidden="true"><span></span></div>

      <section id="loading" class="loading" aria-live="polite" hidden>
        <div class="loading__spinner"></div>
        <p id="loading-text">Construyendo mundo cúbico…</p>
      </section>

      <div id="look-zone" class="look-zone"></div>

      <section id="joystick" class="joystick" aria-label="Joystick de movimiento">
        <div class="joystick__arrows" aria-hidden="true">▲</div>
        <div id="joystick-knob" class="joystick__knob"></div>
      </section>

      <div class="mobile-hint mobile-hint--move" aria-hidden="true">MOVER</div>
      <div class="mobile-hint mobile-hint--look" aria-hidden="true">
        <span>↔</span>
        ARRASTRA PARA MIRAR
      </div>

      <div class="desktop-hint" aria-hidden="true">
        <span><b>WASD</b> MOVER</span>
        <span><b>ARRASTRAR</b> MIRAR</span>
      </div>

      <div id="break-progress" class="break-progress" role="status" aria-live="polite" hidden>
        <span id="break-progress-label">ROMPIENDO BLOQUE</span>
        <div class="break-progress__track">
          <div id="break-progress-fill" class="break-progress__fill"></div>
        </div>
      </div>

      <div id="inventory-bar" class="inventory-bar" role="group" aria-label="Inventario">
        <button
          id="grass-slot"
          class="inventory-slot is-empty is-selected"
          type="button"
          aria-pressed="true"
        >
          <span class="mini-block-float" aria-hidden="true">
            <span class="mini-block mini-block--grass">
              <span class="mini-block__face mini-block__face--front"></span>
              <span class="mini-block__face mini-block__face--back"></span>
              <span class="mini-block__face mini-block__face--right"></span>
              <span class="mini-block__face mini-block__face--left"></span>
              <span class="mini-block__face mini-block__face--top"></span>
              <span class="mini-block__face mini-block__face--bottom"></span>
            </span>
          </span>
          <span class="inventory-slot__name">
            <strong>Bloque de pasto</strong>
          </span>
          <b id="grass-count" class="inventory-slot__count">0 / 32</b>
        </button>

        <button
          id="leaves-slot"
          class="inventory-slot is-empty"
          type="button"
          aria-pressed="false"
        >
          <span class="mini-block-float" aria-hidden="true">
            <span class="mini-block mini-block--leaves">
              <span class="mini-block__face mini-block__face--front"></span>
              <span class="mini-block__face mini-block__face--back"></span>
              <span class="mini-block__face mini-block__face--right"></span>
              <span class="mini-block__face mini-block__face--left"></span>
              <span class="mini-block__face mini-block__face--top"></span>
              <span class="mini-block__face mini-block__face--bottom"></span>
            </span>
          </span>
          <span class="inventory-slot__name">
            <strong>Bloque de hojas</strong>
          </span>
          <b id="leaves-count" class="inventory-slot__count">0 / 32</b>
        </button>

        <button
          id="wood-slot"
          class="inventory-slot is-empty"
          type="button"
          aria-pressed="false"
        >
          <span class="mini-block-float" aria-hidden="true">
            <span class="mini-block mini-block--wood">
              <span class="mini-block__face mini-block__face--front"></span>
              <span class="mini-block__face mini-block__face--back"></span>
              <span class="mini-block__face mini-block__face--right"></span>
              <span class="mini-block__face mini-block__face--left"></span>
              <span class="mini-block__face mini-block__face--top"></span>
              <span class="mini-block__face mini-block__face--bottom"></span>
            </span>
          </span>
          <span class="inventory-slot__name">
            <strong>Bloque de madera</strong>
          </span>
          <b id="wood-count" class="inventory-slot__count">0 / 35</b>
        </button>
      </div>

      <button id="place-block" class="place-block" type="button" aria-label="Colocar bloque de pasto">
        <span aria-hidden="true">＋</span>
        <small>COLOCAR</small>
      </button>

      <div id="action-message" class="action-message" role="status" aria-live="polite" hidden></div>

      <section id="error-panel" class="error-panel" role="alert" hidden>
        <strong>No se pudo iniciar War 3D</strong>
        <p id="error-message">Revisa tu conexión y vuelve a cargar la página.</p>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
